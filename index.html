<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My first web project</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
    <div class="left">
       <img src="images/bg.jpg" alt="Картинка" class="left-img"> 
       <img src="images/logo.svg" alt="Логотип" class="logo">
</div>
   
    <div class="right">
    <div class="form">
   
        <h2>Get iintoo it today</h2>
        <p>There is no charge or obligation upon registration.</p>
    <div class="buttons">
        
         <a class="facebook" href="#">
            <img src="images/facebook.svg">
        Register with Facebook
         </a>
        <a class="linkedin" href="#">
            <img src="images/linkedin.svg">
        Registr with    Linkedin
        </a>
    </div> 

    <div class="or">
    <span>OR</span>
    </div>
    <div class="inputs">
        <div class="input-group">
            <label>Email</label>
            <input type="email">
        </div>
    

    <div class="input-group">
        <label>Phone</label>
        <input type="tel">
    </div>
    </div>
    <div class="investor-block">
    <h3 class="radio-title"> 
        What type of investor are you?

    </h3>
    <p class="radio-subtitle">
        Select the type of investor you are below.
    </p>
    
    <div class="radio-group">
        <label>
            <input type="radio" name="type" checked>
            Individual
          <span class="info">i</span>
        </label>
        <label>
            <input type="radio" name="type">
            Business
            <span class="info">i</span>
        </label>
        <label>
            <input type="radio" name="type">
            IRA
            <span class="info">i</span>
        </label>
        <label>
         <input type="radio" name="type">
          Trust
          <span class="info">i</span>
        </label>
    </div>

    <p class="radio-text">
        I am a natural person investing on my own 
        behalf 
        as a sole owner, joint tenant,
        or tenant in common.
    </p>
    <label class="agree">
        <input type="checkbox">
        I agree to the terms and receiving 
        notifications from iintoo
        <a href="#">Viev full terms</a>
    </label>

    <button class="create-account">
        Create Account
    </button>
    </div>
    </div>
    </div>
</body> 
</html>
